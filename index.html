/* ═══════════════════════════════════════════════
   計算引擎 1：EVP 留才效益（依 DEV_03 規格 v2 / ROI_calculator_v8）
═══════════════════════════════════════════════ */
const _E = { T: 10, beta: 1.2, lag1: 0.5, stressRate: 0.60, prodDrag: 0.12, genZBoost: 0.006, genZBase: 30 };
const TIERS = [
  { key: 'basic',    label: '基礎方案', perPerson: 18000 },
  { key: 'standard', label: '標準方案', perPerson: 36000 },
  { key: 'premium',  label: '進階方案', perPerson: 60000 },
];
const tierP0 = (N, t, r) => Math.round(N * t.perPerson * 0.75 / r / 10000) * 10000;

function evpEngine({ N, S, T0, P0, k, genZPct, withProd, r }) {
  const { T, beta, lag1, stressRate, prodDrag, genZBoost, genZBase } = _E;
  const betaAdj = beta * (1 + genZBoost * Math.max(0, genZPct - genZBase));
  const Cannual = P0 * r;
  const dT = Math.max(0, Math.min((Cannual / N / 10000) * betaAdj, 12, T0 - 3));
  const empSaved = (dT / 100) * N;
  const annualTurnover = empSaved * S * k;
  const annualProd = N * stressRate * S * prodDrag * (dT / Math.max(T0, 1)) * 0.5;
  const annualGain = annualTurnover + (withProd ? annualProd : 0);
  const sav = Array.from({ length: T }, (_, i) => i === 0 ? annualGain * lag1 : annualGain);
  const totalSavings = sav.reduce((a, b) => a + b, 0);
  let p = P0;
  for (let t = 0; t < T; t++) p = p * (1 + r) - Cannual;
  const endAsset = Math.max(0, p);
  const totalReturn = totalSavings + endAsset;
  const netValue = totalReturn - P0;
  const moic = P0 > 0 ? totalReturn / P0 : 0;
  const cumSav = [0]; let cs = 0;
  sav.forEach(v => { cs += v; cumSav.push(cs); });
  let payback = null;
  for (let t = 1; t <= T; t++) {
    if (cumSav[t] >= P0 && payback === null)
      payback = (t - 1) + (P0 - cumSav[t - 1]) / (cumSav[t] - cumSav[t - 1]);
  }
  return { T, dT, newTurnover: T0 - dT, empSaved, Cannual, annualTurnover, annualProd, annualGain,
    totalSavings, endAsset, totalReturn, netValue, moic, payback,
    currentAnnualCost: (T0 / 100) * N * S * k };
}

/* ═══════════════════════════════════════════════
   計算引擎 2：投資建議試算（DEV_02 規格 B / C / D）
═══════════════════════════════════════════════ */
const FEE_B = 0.001425, FEE_S = 0.004425, MIN_B = 1000, STEP_B = 100;

// B — 加碼再平衡（No-Sell：瓶頸資產追蹤 + 最大餘數分配）
function topUpRebalance(holdings, weights, I) {
  const n = holdings.length;
  const AUM0 = holdings.reduce((a, b) => a + b, 0);
  let raw;
  if (AUM0 <= 0) {
    raw = weights.map(w => I * w);          // 空投資組合：直接按目標權重
  } else {
    const ratios = holdings.map((v, i) => weights[i] > 0 ? v / weights[i] : 0);
    const ideal = Math.max(...ratios);      // AUM_ideal = R_max
    const gaps = holdings.map((v, i) => Math.max(0, ideal * weights[i] - v));
    const S = gaps.reduce((a, b) => a + b, 0);
    raw = S > 0 && I < S
      ? gaps.map(g => I * g / S)                              // 情況 A：不足 → 按缺口比例
      : gaps.map((g, i) => g + (I - S) * weights[i]);         // 情況 B：充裕 → 補缺口 + 餘額按權重
  }
  // 級距化（最大餘數法）
  let step = raw.map(v => v >= MIN_B ? Math.floor(v / STEP_B) * STEP_B : 0);
  const rem = raw.map((v, i) => v - step[i]);
  const iTarget = Math.floor(I / STEP_B) * STEP_B;
  let K = Math.round((iTarget - step.reduce((a, b) => a + b, 0)) / STEP_B);
  const order = rem.map((r, i) => [r, i]).sort((a, b) => b[0] - a[0]);
  for (let j = 0; j < order.length && K > 0; j++) {
    const i = order[j][1];
    if (step[i] > 0 || raw[i] >= MIN_B) { step[i] += STEP_B; K--; }
  }
  const buys = step;
  const iActual = buys.reduce((a, b) => a + b, 0);
  const fees = buys.reduce((a, b) => a + b * FEE_B, 0);
  return {
    rows: holdings.map((v, i) => ({ before: v, buy: buys[i], sell: 0, after: v + buys[i],
      wAfter: (v + buys[i]) / (AUM0 + iActual || 1) })),
    iActual, fees, cashNeed: iActual + fees, netCash: 0,
  };
}

// C — 贖回再平衡（Rebalance / Proportional 兩模式）
function redemptionRebalance(holdings, weights, G, mode) {
  const AUM0 = holdings.reduce((a, b) => a + b, 0);
  const g = Math.min(G, AUM0);
  let tv;
  if (g >= AUM0) {
    tv = holdings.map(v => -v);                                // 全額贖回
  } else if (mode === 'proportional') {
    const R = g / AUM0;
    tv = holdings.map(v => -(v * R));
  } else {
    const target = AUM0 - g;
    tv = holdings.map((v, i) => target * weights[i] - v);
    tv = tv.map(v => v > 0 ? (v >= MIN_B ? Math.floor(v / STEP_B) * STEP_B : 0) : v);
  }
  const sells = tv.filter(v => v < 0).reduce((a, b) => a + Math.abs(b), 0);
  const buys = tv.filter(v => v > 0).reduce((a, b) => a + b, 0);
  const fees = tv.reduce((a, v) => a + Math.abs(v) * (v > 0 ? FEE_B : FEE_S), 0);
  const netCash = sells - buys - fees;
  return {
    rows: holdings.map((v, i) => ({ before: v, buy: Math.max(0, tv[i]), sell: Math.max(0, -tv[i]),
      after: v + tv[i], wAfter: (v + tv[i]) / (AUM0 - g || 1) })),
    iActual: buys, fees, cashNeed: 0, netCash, warn: netCash < 0,
  };
}

// D — 一買一賣再平衡（Preserve 模式：賣超配 → 淨現金 → 補低配）
function swapRebalance(holdings, weights) {
  const AUM0 = holdings.reduce((a, b) => a + b, 0);
  const target = holdings.map((_, i) => AUM0 * weights[i]);
  const sellIdx = [], buyIdx = [];
  holdings.forEach((v, i) => (v > target[i] ? sellIdx : buyIdx).push(i));
  const sells = holdings.map((v, i) => sellIdx.includes(i) ? v - target[i] : 0);
  const cashTotal = sells.reduce((a, b) => a + b * (1 - FEE_S), 0);
  const iAvail = cashTotal / (1 + FEE_B);
  const gaps = holdings.map((v, i) => buyIdx.includes(i) ? target[i] - v : 0);
  const gapSum = gaps.reduce((a, b) => a + b, 0);
  let buys = gaps.map(gp => gapSum > 0 ? iAvail * gp / gapSum : 0);
  buys = buys.map(v => v >= MIN_B ? Math.floor(v / STEP_B) * STEP_B : 0);
  const buySum = buys.reduce((a, b) => a + b, 0);
  const fees = sells.reduce((a, b) => a + b * FEE_S, 0) + buySum * FEE_B;
  const residual = cashTotal - buySum * (1 + FEE_B);
  return {
    rows: holdings.map((v, i) => ({ before: v, buy: buys[i], sell: sells[i],
      after: v - sells[i] + buys[i], wAfter: (v - sells[i] + buys[i]) / (AUM0 - fees || 1) })),
    iActual: buySum, fees, cashNeed: 0, netCash: residual,
  };
}

/* ═══════════════════════════════════════════════
   計算引擎 3：蒙地卡羅資產預測（GBM 路徑模擬）
   註：DEV_01 規格文件內容為空，以下為標準 GBM 實作，
   輸出樂觀(P90)/中位(P50)/保守(P10)三情境。
═══════════════════════════════════════════════ */
function mulberry32(seed) {
  return function() {
    let t = seed += 0x6D2B79F5;
    t = Math.imul(t ^ t >>> 15, t | 1);
    t ^= t + Math.imul(t ^ t >>> 7, t | 61);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function monteCarlo({ start, monthly, mu, sigma, years, paths = 400, seed = 42 }) {
  const rand = mulberry32(seed);
  const steps = years * 12, dt = 1 / 12;
  const gauss = () => {
    const u = Math.max(rand(), 1e-9), v = rand();
    return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
  };
  const yearly = Array.from({ length: years + 1 }, () => []);
  for (let p = 0; p < paths; p++) {
    let x = start;
    yearly[0].push(x);
    for (let s = 1; s <= steps; s++) {
      x = x * Math.exp((mu - sigma * sigma / 2) * dt + sigma * Math.sqrt(dt) * gauss()) + monthly;
      if (s % 12 === 0) yearly[s / 12].push(x);
    }
  }
  const q = (arr, p) => { const a = [...arr].sort((x, y) => x - y); return a[Math.min(a.length - 1, Math.floor(p * a.length))]; };
  return {
    p10: yearly.map(a => q(a, 0.10)),
    p50: yearly.map(a => q(a, 0.50)),
    p90: yearly.map(a => q(a, 0.90)),
  };
}
// 退休規劃：定期定額 + 年化報酬 → 各年資產軌跡
function retirementProject({ age, retireAge, monthly, start = 0, r }) {
  const years = Math.max(1, retireAge - age);
  const pts = [start]; let x = start;
  for (let y = 1; y <= years; y++) {
    for (let m = 0; m < 12; m++) x = x * Math.pow(1 + r, 1 / 12) + monthly;
    pts.push(x);
  }
  return { pts, final: x, years };
}
// 動態提領：每月提領至資產歸零
function withdrawalProject({ asset, age, monthly, r, maxAge = 100 }) {
  const pts = [asset]; let x = asset; let depleteAge = null;
  for (let y = 1; y <= maxAge - age; y++) {
    for (let m = 0; m < 12; m++) x = x * Math.pow(1 + r, 1 / 12) - monthly;
    pts.push(Math.max(0, x));
    if (x <= 0 && depleteAge === null) { depleteAge = age + y; break; }
  }
  return { pts, depleteAge: depleteAge ?? maxAge, years: (depleteAge ?? maxAge) - age };
}

/* ═══════════════════════════════════════════════

function Donut({ data, size = 120, stroke = 18, center, sub }) {
  const total = data.reduce((a, d) => a + d.v, 0) || 1;
  const R = (size - stroke) / 2, C = 2 * Math.PI * R;
  let acc = 0;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={size/2} cy={size/2} r={R} fill="none" stroke="#eef1f5" strokeWidth={stroke} />
      {data.map((d, i) => {
        const frac = d.v / total, off = C * (1 - acc), len = C * frac;
        acc += frac;
        return <circle key={i} cx={size/2} cy={size/2} r={R} fill="none" stroke={d.c}
          strokeWidth={stroke} strokeDasharray={`${len} ${C - len}`} strokeDashoffset={off}
          transform={`rotate(-90 ${size/2} ${size/2})`} strokeLinecap="butt" />;
      })}
      {center && <text x="50%" y={sub ? '46%' : '52%'} textAnchor="middle" fontSize={size/8.5}
        fontWeight="700" fill={T.ink} fontFamily="IBM Plex Mono">{center}</text>}
      {sub && <text x="50%" y="60%" textAnchor="middle" fontSize={size/12} fill={T.mute}>{sub}</text>}
    </svg>
  );
}

function LineChart({ series, w = 520, h = 180, yFmt = fmtUSD, labels, fill = false, auto = false }) {
  const all = series.flatMap(s => s.pts);
  const rawMn = Math.min(...all), rawMx = Math.max(...all);
  const pad = (rawMx - rawMn) * 0.18 || 1;
  const mx = auto ? rawMx + pad : Math.max(...all) * 1.08 || 1;
  const mn = auto ? rawMn - pad : Math.min(0, ...all);
  const px = 46, py = 16, pw = w - px - 10, ph = h - py - 26;
  const X = i => px + pw * i / Math.max(1, (series[0].pts.length - 1));
  const Y = v => py + ph - ph * (v - mn) / (mx - mn || 1);
  const path = pts => pts.map((v, i) => `${i ? 'L' : 'M'}${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(' ');
  const ticks = [0, .25, .5, .75, 1].map(f => mn + (mx - mn) * f);
  return (
    <svg width="100%" viewBox={`0 0 ${w} ${h}`} style={{ display:'block' }}>
      {ticks.map((t, i) => (
        <g key={i}>
          <line x1={px} x2={w-10} y1={Y(t)} y2={Y(t)} stroke="#eef1f5" />
          <text x={px-6} y={Y(t)+3} textAnchor="end" fontSize="9" fill={T.dim} fontFamily="IBM Plex Mono">{yFmt(t)}</text>
        </g>
      ))}
      {series.map((s, si) => (
        <g key={si}>
          {fill && <path d={`${path(s.pts)} L${X(s.pts.length-1)},${Y(mn)} L${X(0)},${Y(mn)} Z`} fill={s.c} opacity=".08" />}
          <path d={path(s.pts)} fill="none" stroke={s.c} strokeWidth="2" strokeDasharray={s.dash || 'none'} />
        </g>
      ))}
      {labels && labels.map((l, i) => (
        <text key={i} x={X(l.i)} y={h-8} textAnchor="middle" fontSize="9" fill={T.mute}>{l.t}</text>
      ))}
    </svg>
  );
}

function BandChart({ p10, p50, p90, w = 520, h = 200, yFmt = fmtUSD, xLab = '年' }) {
  const mx = Math.max(...p90) * 1.08 || 1;
  const px = 50, py = 14, pw = w - px - 12, ph = h - py - 26;
  const n = p50.length;
  const X = i => px + pw * i / (n - 1);
  const Y = v => py + ph - ph * v / mx;
  const path = pts => pts.map((v, i) => `${i ? 'L' : 'M'}${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(' ');
  const band = `${path(p90)} ${p10.slice().reverse().map((v, j) => `L${X(n-1-j).toFixed(1)},${Y(v).toFixed(1)}`).join(' ')} Z`;
  return (
    <svg width="100%" viewBox={`0 0 ${w} ${h}`} style={{ display:'block' }}>
      {[0,.25,.5,.75,1].map((f,i) => (
        <g key={i}>
          <line x1={px} x2={w-12} y1={Y(mx*f)} y2={Y(mx*f)} stroke="#eef1f5" />
          <text x={px-6} y={Y(mx*f)+3} textAnchor="end" fontSize="9" fill={T.dim} fontFamily="IBM Plex Mono">{yFmt(mx*f)}</text>
        </g>
      ))}
      <path d={band} fill={T.blue} opacity=".10" />
      <path d={path(p90)} fill="none" stroke={T.green} strokeWidth="1.6" strokeDasharray="4 3" />
      <path d={path(p50)} fill="none" stroke={T.blue} strokeWidth="2.4" />
      <path d={path(p10)} fill="none" stroke={T.orange} strokeWidth="1.6" strokeDasharray="4 3" />
      {p50.map((_, i) => (n <= 12 || i % 5 === 0) && i > 0 ? (
        <text key={i} x={X(i)} y={h-8} textAnchor="middle" fontSize="9" fill={T.mute}>第{i}{xLab}</text>
      ) : null)}
    </svg>
  );
}

function BarChart({ data, w = 460, h = 190, yFmt = fmtUSD }) {
  const mx = Math.max(...data.map(d => d.v)) * 1.15 || 1;
  const px = 54, pw = w - px - 12, ph = h - 40;
  const bw = Math.min(52, pw / data.length * 0.55);
  return (
    <svg width="100%" viewBox={`0 0 ${w} ${h}`} style={{ display:'block' }}>
      {[0,.33,.66,1].map((f,i) => (
        <g key={i}>
          <line x1={px} x2={w-12} y1={14+ph-ph*f} y2={14+ph-ph*f} stroke="#eef1f5" />
          <text x={px-6} y={17+ph-ph*f} textAnchor="end" fontSize="9" fill={T.dim} fontFamily="IBM Plex Mono">{yFmt(mx*f)}</text>
        </g>
      ))}
      {data.map((d, i) => {
        const x = px + pw * (i + .5) / data.length - bw/2;
        const bh = ph * d.v / mx;
        return (
          <g key={i}>
            <rect x={x} y={14+ph-bh} width={bw} height={bh} rx="3" fill={d.c} />
            {d.g !== undefined && (
              <text x={x+bw/2} y={14+ph-bh-6} textAnchor="middle" fontSize="9.5" fontWeight="700"
                fill={d.g >= 0 ? T.green : T.red} fontFamily="IBM Plex Mono">{pct(d.g)}</text>
            )}
            <text x={x+bw/2} y={h-10} textAnchor="middle" fontSize="9.5" fill={T.inkSoft}>{d.l}</text>
          </g>
        );
      })}
    </svg>
  );
}

// 堆疊長條圖：資金結構（公提 vs 自提）等
function StackedBars({ data, w = 460, h = 190, yFmt = fmtUSD }) {
  const mx = Math.max(...data.map(d => d.parts.reduce((a, p) => a + p.v, 0))) * 1.15 || 1;
  const px = 54, pw = w - px - 12, ph = h - 40;
  const bw = Math.min(44, pw / data.length * 0.58);
  return (
    <svg width="100%" viewBox={`0 0 ${w} ${h}`} style={{ display:'block' }}>
      {[0,.33,.66,1].map((f,i) => (
        <g key={i}>
          <line x1={px} x2={w-12} y1={14+ph-ph*f} y2={14+ph-ph*f} stroke="#eef1f5" />
          <text x={px-6} y={17+ph-ph*f} textAnchor="end" fontSize="9" fill={T.dim} fontFamily="IBM Plex Mono">{yFmt(mx*f)}</text>
        </g>
      ))}
      {data.map((d, i) => {
        const x = px + pw * (i + .5) / data.length - bw/2;
        let y = 14 + ph;
        return (
          <g key={i}>
            {d.parts.map((p, j) => {
              const bh = ph * p.v / mx;
              y -= bh;
              return <rect key={j} x={x} y={y} width={bw} height={Math.max(0, bh - 1)}
                rx={j === d.parts.length - 1 ? 3 : 0} fill={p.c} />;
            })}
            <text x={x+bw/2} y={h-10} textAnchor="middle" fontSize="9.5" fill={T.inkSoft}>{d.l}</text>
          </g>
        );
      })}
    </svg>
  );
}

// 複合圖：長條（金額，左軸）＋ 折線（比率 %，右軸）
function ComboChart({ data, w = 540, h = 205, yFmt = n => 'NT$'+(n/1000).toFixed(0)+'k' }) {
  const mxA = Math.max(...data.map(d => d.amt)) * 1.2 || 1;
  const px = 52, pr = 40, pw = w - px - pr, ph = h - 44;
  const bw = Math.min(30, pw / data.length * 0.46);
  const X = i => px + pw * (i + .5) / data.length;
  const YA = v => 16 + ph - ph * v / mxA;
  const YR = v => 16 + ph - ph * v / 100;
  const line = data.map((d, i) => `${i ? 'L' : 'M'}${X(i).toFixed(1)},${YR(d.rate).toFixed(1)}`).join(' ');
  return (
    <svg width="100%" viewBox={`0 0 ${w} ${h}`} style={{ display:'block' }}>
      {[0,.25,.5,.75,1].map((f,i) => (
        <g key={i}>
          <line x1={px} x2={w-pr} y1={16+ph-ph*f} y2={16+ph-ph*f} stroke="#eef1f5" />
          <text x={px-6} y={19+ph-ph*f} textAnchor="end" fontSize="9" fill={T.dim} fontFamily="IBM Plex Mono">{yFmt(mxA*f)}</text>
          <text x={w-pr+6} y={19+ph-ph*f} textAnchor="start" fontSize="9" fill={T.dim} fontFamily="IBM Plex Mono">{(100*f).toFixed(0)}%</text>
        </g>
      ))}
      {data.map((d, i) => (
        <g key={i}>
          <rect x={X(i)-bw/2} y={YA(d.amt)} width={bw} height={16+ph-YA(d.amt)} rx="3" fill={T.blue} opacity=".28" />
          <text x={X(i)} y={h-10} textAnchor="middle" fontSize="9" fill={T.mute}>{d.l}</text>
        </g>
      ))}
      <path d={line} fill="none" stroke={T.green} strokeWidth="2.4" />
      {data.map((d, i) => (
        <circle key={i} cx={X(i)} cy={YR(d.rate)} r="3.2" fill="#fff" stroke={T.green} strokeWidth="2" />
      ))}
    </svg>
  );
}

function Walkthrough({ role, onDone }) {

    { t:'🏠 系統主選單', d:'「系統主選單」是您的導航中心：以卡片呈現各模組的功能說明，點擊卡片即可前往。迷路時回到這裡就對了。', pos:'left' },
    { t:'💬 AI 小助理與常見問題', d:'右下角的對話泡泡是 AI 小助理，隨時解答平台操作與投資常識；也可以在主選單進入「常見問題」頁。', pos:'br' },
    { t:'🎉 一切就緒！', d:'導覽結束。您隨時可以在主選單右上角點選「重看導覽」。開始探索吧！', pos:'center' },
  ];
  const s = steps[step];
  const posStyle = s.pos === 'left'
    ? { left: 240, top: 120 }
    : s.pos === 'br'
    ? { right: 90, bottom: 90 }
    : { left:'50%', top:'42%', transform:'translate(-50%,-50%)' };
  return (
    <div style={{ position:'fixed', inset: 0, background:'rgba(10,16,32,.62)', zIndex: 200 }} onClick={onDone}>
      {s.pos === 'left' && <div style={{ position:'absolute', left: 0, top: 0, bottom: 0, width: 218,
        border:`2.5px solid ${T.blue}`, borderRadius: 4, boxShadow:'0 0 0 4000px rgba(10,16,32,0)', pointerEvents:'none' }} />}
      <div onClick={e => e.stopPropagation()} className="fade-up" style={{ position:'absolute', ...posStyle,
        width: 340, background:'#fff', borderRadius: 14, padding:'20px 22px', boxShadow:'0 18px 60px rgba(0,0,0,.4)' }}>
        <div style={{ fontSize: 15.5, fontWeight: 700, marginBottom: 8 }}>{s.t}</div>
        <div style={{ fontSize: 13, color: T.inkSoft, lineHeight: 1.75 }}>{s.d}</div>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginTop: 18 }}>
          <div style={{ display:'flex', gap: 5 }}>
            {steps.map((_, i) => <span key={i} style={{ width: 7, height: 7, borderRadius:'50%',
              background: i === step ? T.blue : '#d8dfe8' }} />)}
          </div>
          <div style={{ display:'flex', gap: 8 }}>
            <Btn kind="ghost" size="sm" onClick={onDone}>略過</Btn>
            <Btn size="sm" onClick={() => step < steps.length - 1 ? setStep(step + 1) : onDone()}>
              {step < steps.length - 1 ? '下一步' : '完成'}
            </Btn>
          </div>
        </div>
      </div>
    </div>
  );
}

];
function ChatWidget() {
  const [open, setOpen] = useState(false);
  const [msgs, setMsgs] = useState([{ me: false, t:'Hi 👋 我是阿爾發 AI 小助理！關於平台操作或投資名詞，都可以問我。' }]);
  const [input, setInput] = useState('');
  const boxRef = useRef(null);
  useEffect(() => { if (boxRef.current) boxRef.current.scrollTop = boxRef.current.scrollHeight; }, [msgs, open]);
  const send = (text) => {
    const q = (text ?? input).trim();
    if (!q) return;
    const lower = q.toLowerCase();
    const hit = AI_RULES.find(r => r.k.some(k => lower.includes(k)));
    const a = hit ? hit.a : '這個問題我記下來了！目前 prototype 階段我能回答平台操作與投資名詞（試試「什麼是偏離率」）。正式版將串接客服知識庫與真人轉接。';
    setMsgs(m => [...m, { me: true, t: q }, { me: false, t: a }]);
    setInput('');
  };
  return (
    <>
      <div onClick={() => setOpen(o => !o)} style={{ position:'fixed', right: 26, bottom: 26, width: 56, height: 56,
        borderRadius:'50%', background: T.blue, color:'#fff', display:'flex', alignItems:'center', justifyContent:'center',
        fontSize: 24, cursor:'pointer', boxShadow:'0 8px 24px rgba(37,99,235,.45)', zIndex: 150,
        animation:'pulse 2.6s infinite' }}>
        {open ? '×' : '💬'}
      </div>
      {open && (
        <div className="fade-up" style={{ position:'fixed', right: 26, bottom: 94, width: 330, height: 430,
          background:'#fff', borderRadius: 16, boxShadow:'0 20px 60px rgba(0,0,0,.28)', zIndex: 150,
          display:'flex', flexDirection:'column', overflow:'hidden' }}>
          <div style={{ background: T.blue, color:'#fff', padding:'13px 17px' }}>
            <div style={{ fontWeight: 700, fontSize: 14 }}>✦ 阿爾發 AI 小助理</div>
            <div style={{ fontSize: 11, opacity:.85, marginTop: 2 }}>平台操作 · 常見問題 · 投資名詞</div>
          </div>
          <div ref={boxRef} style={{ flex: 1, overflowY:'auto', padding: 14, display:'flex', flexDirection:'column', gap: 9 }}>
            {msgs.map((m, i) => (
              <div key={i} style={{ alignSelf: m.me ? 'flex-end' : 'flex-start', maxWidth:'82%',
                background: m.me ? T.blue : '#f0f3f8', color: m.me ? '#fff' : T.ink,
                padding:'8px 12px', borderRadius: m.me ? '12px 12px 3px 12px' : '12px 12px 12px 3px',
                fontSize: 12.5, lineHeight: 1.65 }}>{m.t}</div>
            ))}
          </div>
          <div style={{ padding:'8px 10px', borderTop:`1px solid ${T.line}`, display:'flex', gap: 6, flexWrap:'wrap' }}>
            {['什麼是偏離率？','公提與自提差別？','怎麼做退休試算？'].map(s => (
              <button key={s} onClick={() => send(s)} style={{ fontSize: 10.5, color: T.blue,
                background: T.bluePale, border:'none', borderRadius: 20, padding:'4px 10px' }}>{s}</button>
            ))}
          </div>
          <div style={{ display:'flex', padding: 10, gap: 8, borderTop:`1px solid ${T.line}` }}>
            <input value={input} onChange={e => setInput(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && send()}
              placeholder="輸入您的問題…" style={{ flex: 1, border:`1px solid ${T.line}`, borderRadius: 8,
                padding:'8px 12px', fontSize: 13, outline:'none' }} />
            <Btn size="sm" onClick={() => send()}>➤</Btn>
          </div>
        </div>
      )}
    </>
  );
}

/* ═══════════════════════════════════════════════
   L1/L2-C 投組建議試算（DEV_02 B/C/D 引擎）
═══════════════════════════════════════════════ */
function AdvicePage({ role }) {
  const [tab, setTab] = useState('試算輸入');
  const [algo, setAlgo] = useState('B');
  const [redeemMode, setRedeemMode] = useState('rebalance');
  const [amounts, setAmounts] = useState(() => Object.fromEntries(EMPLOYEES.slice(0, 5).map(e => [e.id, { pub: 0, self: 0, redeem: 0 }])));
  const [results, setResults] = useState(null);
  const [history, setHistory] = useState([
    { d:'2026-06-25 14:30', dir:'買進', status:'已完成', amt: 18500, n: 3 },
  ]);
  const [accCash, setAccCash] = useState(true);

  const empRows = EMPLOYEES.slice(0, 5);
  // 各員工目前持倉（依風險屬性模型的標的，市值mock）
  const holdingsOf = (e) => {
    const model = MODELS.find(m => m.key === e.risk);
    const base = e.mv || 5000;
    // 刻意偏離目標權重，才有再平衡空間
    return model.alloc.map((a, i) => ({ ...a, v: Math.round(base * (a.w / 100) * (i === 0 ? 1.35 : 0.82)) }));
  };
  const setAmt = (id, k, v) => setAmounts(a => ({ ...a, [id]: { ...a[id], [k]: v } }));

  const run = () => {
    const out = empRows.map(e => {
      const hs = holdingsOf(e);
      const holdings = hs.map(h => h.v);
      const weights = hs.map(h => h.w / 100);
      const I = (amounts[e.id].pub || 0) + (amounts[e.id].self || 0);
      const G = amounts[e.id].redeem || 0;
      let r;
      if (algo === 'B') r = topUpRebalance(holdings, weights, I);
      else if (algo === 'C') r = redemptionRebalance(holdings, weights, G, redeemMode);
      else r = swapRebalance(holdings, weights);
      return { emp: e, funds: hs, r, input: algo === 'C' ? G : I };
    }).filter(x => algo === 'D' || x.input > 0);
    setResults(out);
    if (out.length) {
      setHistory(h => [{ d: new Date().toISOString().slice(0,16).replace('T',' '),
        dir: algo === 'C' ? '贖回' : '買進', status:'已完成',
        amt: Math.round(out.reduce((a, o) => a + (algo === 'C' ? o.r.netCash : o.r.iActual), 0)), n: out.length }, ...h]);
    }
  };
  const ALGO_INFO = {

function AdviceResults({ results, algo }) {
  const [dim, setDim] = useState('個人');
  const totInvest = results.reduce((a, x) => a + x.r.iActual, 0);
  const totFees = results.reduce((a, x) => a + x.r.fees, 0);
  const totCash = results.reduce((a, x) => a + (x.r.cashNeed || 0), 0);
  const totNet = results.reduce((a, x) => a + (x.r.netCash || 0), 0);
  return (
    <Card className="fade-up" style={{ border:`1.5px solid ${T.blueBorder}` }}>
      <CardTitle right={<Tabs tabs={['個人','標的']} cur={dim} set={setDim} />}
        sub="每位員工依其風險屬性之目標投組計算。">✅ 試算結果</CardTitle>
      <div style={{ display:'flex', gap: 12, marginBottom: 16, flexWrap:'wrap' }}>
        <Badge color={T.blue}>實際投入 Σ {fmtUSD(totInvest)}</Badge>
        <Badge color={T.orange}>估計手續費 {fmtUSD(Math.round(totFees))}</Badge>
        {algo === 'B' && <Badge color={T.red}>需圈存總額 {fmtUSD(Math.round(totCash))}</Badge>}
        {algo === 'C' && <Badge color={totNet >= 0 ? T.green : T.red}>淨贖回金額 {fmtUSD(Math.round(totNet))}</Badge>}
        {algo === 'D' && <Badge color={T.green}>剩餘現金 {fmtUSD(Math.round(totNet))}</Badge>}
      </div>
      {results.some(x => x.r.warn) && (
        <div style={{ background: T.redPale, border:`1px solid ${T.redBorder}`, borderRadius: 9,
          padding:'10px 14px', fontSize: 12, color: T.red, marginBottom: 12 }}>
          ⚠ 偵測到淨贖回金額為負（買入+費用超過賣出），系統已攔截，請調降再平衡買入或改用等比例模式。
        </div>
      )}
      {dim === '個人' ? results.map((x, i) => (
        <div key={i} style={{ marginBottom: i < results.length - 1 ? 18 : 0 }}>
          <div style={{ display:'flex', gap: 10, alignItems:'center', marginBottom: 8 }}>
            <span style={{ fontWeight: 700, fontSize: 13.5 }}>{x.emp.name}</span>
            <Badge color={RISK_COLORS[x.emp.risk]}>{x.emp.riskLabel}</Badge>
            <span style={{ fontSize: 11.5, color: T.mute }}>
              {algo === 'C' ? `贖回 ${fmtUSD(x.input)} → 實收 ${fmtUSD(Math.round(x.r.netCash))}` :
               algo === 'D' ? `無現金流調整 · 剩餘現金 ${fmtUSD(Math.round(x.r.netCash))}` :
               `投入 ${fmtUSD(x.input)} → 實際分配 ${fmtUSD(x.r.iActual)}（圈存 ${fmtUSD(Math.round(x.r.cashNeed))}）`}
            </span>
          </div>
          <Tbl head={['標的','交易前市值','買入','賣出','交易後市值','交易後權重 / 目標']}
            align={['left','right','right','right','right','right']}
            rows={x.funds.map((f, j) => {
              const row = x.r.rows[j];
              return [
                <span style={{ fontSize: 11.5 }}>{f.name.length > 17 ? f.name.slice(0,17)+'…' : f.name}<span style={{ color: T.dim }}> {f.code}</span></span>,
                <span className="mono">{fmtUSD(row.before)}</span>,
                <span className="mono" style={{ color: row.buy ? T.red : T.dim, fontWeight: row.buy ? 700 : 400 }}>{row.buy ? '+' + fmtUSD(Math.round(row.buy)) : '—'}</span>,
                <span className="mono" style={{ color: row.sell ? T.green : T.dim, fontWeight: row.sell ? 700 : 400 }}>{row.sell ? '−' + fmtUSD(Math.round(row.sell)) : '—'}</span>,
                <span className="mono">{fmtUSD(Math.round(row.after))}</span>,
                <span className="mono" style={{ fontSize: 11.5 }}>{(row.wAfter * 100).toFixed(1)}% / {f.w}%</span>,
              ];
            })} />
        </div>
      )) : (
        <Tbl head={['標的','合計買入','合計賣出','涉及員工數']}
          align={['left','right','right','right']}
          rows={(() => {
            const agg = {};
            results.forEach(x => x.funds.forEach((f, j) => {
              agg[f.code] = agg[f.code] || { name: f.name, buy: 0, sell: 0, n: 0 };
              agg[f.code].buy += x.r.rows[j].buy; agg[f.code].sell += x.r.rows[j].sell;
              if (x.r.rows[j].buy || x.r.rows[j].sell) agg[f.code].n++;
            }));
            return Object.entries(agg).map(([code, a]) => [
              <span style={{ fontSize: 11.5 }}>{a.name}<span style={{ color: T.dim }}> {code}</span></span>,
              <span className="mono" style={{ color: a.buy ? T.red : T.dim }}>{a.buy ? '+' + fmtUSD(Math.round(a.buy)) : '—'}</span>,
              <span className="mono" style={{ color: a.sell ? T.green : T.dim }}>{a.sell ? '−' + fmtUSD(Math.round(a.sell)) : '—'}</span>,
              <span className="mono">{a.n}</span>,
            ]);
          })()} />
      )}
    </Card>
  );
}

/* ═══════════════════════════════════════════════
   市場模擬（一週）：2026/07/01–07/07，5 個交易日
   相關係數市場因子 + 個別資產波動（種子可重跑）
═══════════════════════════════════════════════ */
const SIM_DAYS = [
  { d:'07/01', wd:'三' }, { d:'07/02', wd:'四' }, { d:'07/03', wd:'五' },
  { d:'07/06', wd:'一' }, { d:'07/07', wd:'二' },
];
const SIM_ASSETS = [
  { code:'VT',   name:'全球股票 ETF (VT)',        beta: 1.00, vol: 0.0080, mu: 0.0006 },
  { code:'QQQ',  name:'NASDAQ 100 (QQQ)',         beta: 1.35, vol: 0.0120, mu: 0.0008 },
  { code:'BND',  name:'全球債券 ETF (BND)',        beta: -0.15, vol: 0.0022, mu: 0.0002 },
  { code:'CASH', name:'現金',                      beta: 0,    vol: 0,      mu: 0.00005 },
  { code:'TW000T0575Y8', name:'元大全球ETF穩健組合', beta: 0.45, vol: 0.0035, mu: 0.0003 },
  { code:'TW000T3620Y9', name:'安聯四季回報債券組合', beta: -0.08, vol: 0.0018, mu: 0.0002 },
  { code:'TW000T3209A1', name:'野村全球短期收益',    beta: 0.02, vol: 0.0008, mu: 0.0001 },
  { code:'TW000T0429Y8', name:'復華全球債券組合',    beta: -0.10, vol: 0.0020, mu: 0.0002 },
];
function simulateWeek(seed) {
  const rand = mulberry32(seed);
  const gauss = () => {
    const u = Math.max(rand(), 1e-9), v = rand();
    return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
  };
  const mkt = SIM_DAYS.map(() => gauss()); // 系統性市場因子（讓股債呈現合理相關性）
  const rets = {};
  SIM_ASSETS.forEach(a => {
    rets[a.code] = mkt.map(m => a.vol === 0 ? a.mu : a.mu + a.vol * (0.8 * a.beta * m + 0.6 * gauss()));
  });
  const idx = {};
  SIM_ASSETS.forEach(a => { let x = 100; idx[a.code] = [100, ...rets[a.code].map(r => (x = x * (1 + r)))]; });
  const modelIdx = {};
  MODELS.forEach(m => {
    modelIdx[m.key] = Array.from({ length: SIM_DAYS.length + 1 }, (_, t) =>
      m.alloc.reduce((s, al) => s + al.w / 100 * (idx[al.code] ? idx[al.code][t] : 100), 0));
  });
  return { rets, idx, modelIdx };
}
function MarketSimPage() {
  const [seed, setSeed] = useState(20260701);
  const sim = useMemo(() => simulateWeek(seed), [seed]);
  const wk = k => sim.modelIdx[k][SIM_DAYS.length] - 100;
  const ranked = MODELS.map(m => ({ k: m.key, name: m.name, r: wk(m.key) })).sort((a, b) => b.r - a.r);
  // 機構風險組合權重（示意）→ 機構層週表現
  const MIX = { alpha:{ RR3:.30, RR4:.45, RR5:.25 }, beta:{ RR3:.50, RR4:.40, RR5:.10 }, gamma:{ RR3:0, RR4:.20, RR5:.80 } };
  const orgSeries = INSTITUTIONS.map((o, i) => {
    const pts = Array.from({ length: SIM_DAYS.length + 1 }, (_, t) =>
      Object.entries(MIX[o.id]).reduce((s, [k, w]) => s + w * sim.modelIdx[k][t], 0));
    return { o, pts, ret: pts[pts.length - 1] - 100, c: [T.blue, T.green, T.orange][i] };
  });
  const totalAum0 = INSTITUTIONS.reduce((a, o) => a + o.aum, 0);
  const totalAum1 = orgSeries.reduce((a, s) => a + s.o.aum * (1 + s.ret / 100), 0);
  // 員工週損益
  const empRows = EMPLOYEES.filter(e => e.mv > 0).map(e => {
    const p = sim.modelIdx[e.risk];
    return { e, end: e.mv * p[p.length - 1] / 100, ret: p[p.length - 1] - 100 };
  });
  // 波動敘事：以 VT 找最佳／最差交易日
  const vt = sim.rets.VT.map(r => r * 100);
  const worstI = vt.indexOf(Math.min(...vt)), bestI = vt.indexOf(Math.max(...vt));
  const dayLabels = [{ i: 0, t:'期初' }, ...SIM_DAYS.map((d, i) => ({ i: i + 1, t: d.d }))];
  const fmtR = (v, digits = 2) => (
    <span className="mono" style={{ color: v > 0.005 ? T.red : v < -0.005 ? T.green : T.mute, fontWeight: 600 }}>
      {v >= 0 ? '+' : ''}{v.toFixed(digits)}%
    </span>
  ); // 台股慣例：紅漲綠跌
  return (
    <div>
      <PageHead title="市場模擬（一週）"
        sub="模擬期間 2026/07/01（三）– 07/07（二），共 5 個交易日；07/04–07/05 週末休市。資料為亂數情境，僅供介面示範。"
        right={<div style={{ display:'flex', gap: 10, alignItems:'center' }}>
          <Badge color={T.mute}>情境種子 #{seed}</Badge>
          <Btn size="sm" onClick={() => setSeed(Math.floor(Math.random() * 1e9))}>🎲 重跑一週模擬</Btn>
          {seed !== 20260701 && <Btn kind="ghost" size="sm" onClick={() => setSeed(20260701)}>還原預設情境</Btn>}
        </div>} />
      <div style={{ display:'flex', gap: 12, marginBottom: 16, flexWrap:'wrap' }}>
        <KPI label="全機構 AUM（07/07 期末）" value={fmtUSD(totalAum1)}
          sub={<span>週變化 {fmtR((totalAum1 / totalAum0 - 1) * 100)}（期初 {fmtUSD(totalAum0)}）</span>} icon="🏦" />
        <KPI label="本週最佳模型" value={ranked[0].name.split(' ')[0]} color={RISK_COLORS[ranked[0].k]}
          sub={<span>週報酬 {fmtR(ranked[0].r)}</span>} icon="🏆" />
        <KPI label="本週最弱模型" value={ranked[2].name.split(' ')[0]} color={RISK_COLORS[ranked[2].k]}
          sub={<span>週報酬 {fmtR(ranked[2].r)}</span>} icon="🪫" />
        <KPI label="最大單日波動（VT）" value={`${SIM_DAYS[worstI].d}（${SIM_DAYS[worstI].wd}）`}
          sub={<span>當日 {fmtR(vt[worstI])}；最佳 {SIM_DAYS[bestI].d} {fmtR(vt[bestI])}</span>} icon="⚡" />
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'1.35fr 1fr', gap: 14, marginBottom: 14 }}>
        <Card>
          <CardTitle sub="三種風險模型以 07/01 期初 = 100 指數化；圖右圖例附本週累積報酬。">📈 模型累積表現（指數化）</CardTitle>
          <LineChart auto w={560} h={200} yFmt={n => n.toFixed(1)} labels={dayLabels}
            series={MODELS.map(m => ({ pts: sim.modelIdx[m.key], c: RISK_COLORS[m.key] }))} />
          <div style={{ display:'flex', gap: 18, fontSize: 11.5, color: T.inkSoft, marginTop: 6, flexWrap:'wrap' }}>
            {MODELS.map(m => (
              <span key={m.key}><span style={{ color: RISK_COLORS[m.key] }}>●</span> {m.name}　{fmtR(wk(m.key))}</span>
            ))}
          </div>
        </Card>
        <Card>
          <CardTitle sub="主要標的每日報酬率；紅漲綠跌。">🗓 每日資產報酬率</CardTitle>
          <Tbl head={['標的', ...SIM_DAYS.map(d => `${d.d}`)]}
            align={['left','right','right','right','right','right']}
            rows={SIM_ASSETS.filter(a => a.code !== 'CASH').slice(0, 6).map(a => [
              <span style={{ fontSize: 11.5 }}>{a.name}</span>,
              ...sim.rets[a.code].map(r => fmtR(r * 100)),
            ])} />
        </Card>
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'1.35fr 1fr', gap: 14 }}>
        <Card>
          <CardTitle sub="三機構依其風險模型組合權重推算，期初 = 100 指數化；圖例附週變化與期末 AUM。">🏛 機構資產走勢（指數化）</CardTitle>
          <LineChart auto w={560} h={190} yFmt={n => n.toFixed(1)} labels={dayLabels}
            series={orgSeries.map(s => ({ pts: s.pts, c: s.c }))} />
          <div style={{ display:'flex', flexDirection:'column', gap: 5, marginTop: 8 }}>
            {orgSeries.map(s => (
              <div key={s.o.id} style={{ display:'flex', gap: 10, fontSize: 11.5, alignItems:'baseline' }}>
                <span style={{ color: s.c }}>●</span>
                <span style={{ flex: 1, color: T.inkSoft }}>{s.o.name}</span>
                {fmtR(s.ret)}
                <span className="mono" style={{ color: T.mute }}>期末 {fmtUSD(s.o.aum * (1 + s.ret / 100))}</span>
              </div>
            ))}
          </div>
        </Card>
        <Card>
          <CardTitle sub="有持倉之員工，依各自風險模型計算週損益。">👥 員工市值週變化</CardTitle>

              <span style={{ fontWeight: 600 }}>{e.name}</span>,
              <Badge color={RISK_COLORS[e.risk]}>{e.risk}</Badge>,
              <span className="mono">NT${e.mv.toLocaleString()}</span>,
              <span className="mono" style={{ fontWeight: 600 }}>NT${Math.round(end).toLocaleString()}</span>,

/* ═══════════════════════════════════════════════

const GOLD = { g: T.gold, pale: T.goldPale, border: T.goldBorder };
function EVPCtrl({ label, unit, v, set, min, max, step, hint }) {
  return (
    <div style={{ marginBottom: 12, paddingBottom: 9, borderBottom:`1px dashed ${T.line}` }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom: 4 }}>
        <div style={{ fontSize: 12, color: T.inkSoft }}>{label}</div>
        <div style={{ display:'flex', alignItems:'baseline', gap: 3 }}>
          <input type="number" value={v} step={step}
            onChange={e => { const n = Number(e.target.value); if (!isNaN(n)) set(n); }}
            className="mono" style={{ width: 64, fontSize: 14.5, fontWeight: 600, color: GOLD.g,
              background:'transparent', border:'none', outline:'none', textAlign:'right' }} />
          {unit && <span style={{ fontSize: 10.5, color: T.mute }}>{unit}</span>}
        </div>
      </div>
      <input type="range" className="gold" min={min} max={max} step={step} value={v}
        onChange={e => set(Number(e.target.value))} />
      {hint && <div className="mono" style={{ fontSize: 9.5, color: T.mute, marginTop: 3 }}>{hint}</div>}
    </div>
  );
}
function EVPQuote({ text, src, color }) {
  return (
    <div style={{ marginTop: 12, padding:'10px 14px', borderLeft:`3px solid ${color}`,
      background:'#f8fafc', borderRadius:'0 8px 8px 0' }}>

      <div className="mono" style={{ fontSize: 9.5, color: T.mute, marginTop: 4 }}>— {src}</div>
    </div>
  );
}
function EVPCalc() {
  const [N, setN] = useState(500);
  const [Sm, setSm] = useState(120);

  const [k, setK] = useState(1.0);

  const [tier, setTier] = useState('standard');
  const [cP0, setCP0] = useState(null);
  const [withProd, setWithProd] = useState(false);
  const [rPct, setRPct] = useState(10);
  const [rPreset, setRPreset] = useState('成長');
  const [acc, setAcc] = useState({}); // 分項分析預設全部收合，需要時才展開（progressive disclosure）
  const r = rPct / 100;
  const R_PRESETS = [
    { label:'保守', r: 6 }, { label:'穩健', r: 8 }, { label:'成長', r: 10 }, { label:'積極', r: 12 },
  ];
  const P0m = useMemo(() => {
    if (cP0 !== null) return cP0;
    const t = TIERS.find(x => x.key === tier);
    return t ? Math.round(tierP0(N, t, r) / 10000) : Math.round(N * 36000 * 0.75 / r / 10000);
  }, [cP0, tier, N, r]);
  const P0 = P0m * 10000;
  const P0min = Math.round(N * 18000 * 0.75 / r / 10000) * 10000;
  const P0max = Math.round(N * 60000 * 0.75 / r / 10000) * 10000 * 3;
  const P0step = Math.max(100000, Math.round(P0min * 0.05 / 10000) * 10000);
  const res = useMemo(() =>
    evpEngine({ N, S: Sm * 10000, T0, P0, k, genZPct: genZ, withProd, r }),
    [N, Sm, T0, P0, k, genZ, withProd, r]);
  const singleRatio = res.Cannual > 0 ? res.annualTurnover / res.Cannual : 0;

/* ═══════════════════════════════════════════════
   L3-A0 自提金加碼（同一介面內的個人加碼動作）

   不建立平行資料結構；不影響 EVP 引擎（規格如此）。
═══════════════════════════════════════════════ */
function TopUpCard({ topUps, onTopUp, currentTotal }) {
  const [amt, setAmt] = useState('');
  const [justSent, setJustSent] = useState(null);
  const total = topUps.reduce((a, t) => a + t.amt, 0);
  const n = Math.max(0, Number(amt) || 0);
  // 即時預估：一筆加碼到 65 歲退休（25 年、RR4 年化 6.5%）的成長
  const AGE = 40, RET = 65, R = 0.065, MONTHLY = 350;
  const base = retirementProject({ age: AGE, retireAge: RET, monthly: MONTHLY, start: currentTotal, r: R });
  const boost = retirementProject({ age: AGE, retireAge: RET, monthly: MONTHLY, start: currentTotal + n, r: R });

            💡 此為輔助試算工具，調整參數不會變動您的真實投資；實際帳戶狀況請至「投資監控（個人）」查看。

}

/* ═══════════════════════════════════════════════
   L3-D 動態提領試算
═══════════════════════════════════════════════ */
function WithdrawPage() {
  const [asset, setAsset] = useState(6500000);
  const [age, setAge] = useState(65);
  const [monthly, setMonthly] = useState(30000);
  const [proj, setProj] = useState(() => withdrawalProject({ asset: 6500000, age: 65, monthly: 30000, r: 0.04 }));
  const run = () => setProj(withdrawalProject({ asset, age, monthly, r: 0.04 }));
  const Field = ({ label, v, set }) => (
    <div style={{ marginBottom: 13 }}>
      <div style={{ fontSize: 11.5, color: T.mute, marginBottom: 5 }}>{label}</div>
      <input type="number" value={v} onChange={e => set(Number(e.target.value) || 0)}
        className="mono" style={{ width:'100%', padding:'9px 12px', border:`1px solid ${T.line}`,
          borderRadius: 8, fontSize: 14, outline:'none' }} />
    </div>
  );
  return (
    <div>
      <PageHead title="動態提領試算" sub="純試算工具：評估退休後每月提領金額對資產壽命的影響。"
        right={<Btn kind="ghost" size="sm">📋 純試算模式</Btn>} />
      <div style={{ display:'grid', gridTemplateColumns:'320px 1fr', gap: 16, alignItems:'start' }}>
        <Card>
          <CardTitle>💧 規劃您的提領目標</CardTitle>
          <Field label="開始提領時的總資產 (NT$)" v={asset} set={setAsset} />
          <Field label="開始提領年齡" v={age} set={setAge} />
          <Field label="期望每月提領金額 (NT$)" v={monthly} set={setMonthly} />
          <div style={{ background:'#f8fafc', borderRadius: 9, padding:'10px 13px', marginBottom: 14 }}>
            <div style={{ fontSize: 11, color: T.mute }}>投資組合預期報酬率</div>
            <div className="mono" style={{ fontSize: 17, fontWeight: 700 }}>4.0%
              <span style={{ fontSize: 10, color: T.mute, fontWeight: 400 }}>（退休後建議降低風險至保守型配置）</span></div>
          </div>
          <Btn kind="green" onClick={run} style={{ width:'100%' }}>🔄 更新試算結果</Btn>
        </Card>
        <div style={{ display:'flex', flexDirection:'column', gap: 14 }}>
          <Card>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
              <div style={{ fontSize: 12.5, fontWeight: 700 }}>⭐ 試算提領年限</div>
              <div style={{ textAlign:'right' }}>
                <div className="mono" style={{ fontSize: 30, fontWeight: 700, color: T.blue }}>
                  {proj.depleteAge >= 100 ? '100+ ' : `${proj.depleteAge} `}歲
                </div>
                <div style={{ fontSize: 11.5, color: T.mute }}>預計提領年限約 {proj.years} 年{proj.depleteAge >= 100 ? '（資產可持續超過試算上限）' : ''}</div>
              </div>
            </div>
          </Card>
          <Card>
            <CardTitle>📉 資產走向與安全線預測 (萬)</CardTitle>
            <LineChart w={620} h={210} fill yFmt={n => (n/10000).toFixed(0)}
              series={[{ pts: proj.pts, c:'#7c5cff' }]}
              labels={[0, .25, .5, .75, 1].map(f => ({ i: Math.round((proj.pts.length-1)*f), t:`${age + Math.round(proj.years*f)}歲` }))} />
          </Card>
          <div style={{ background: T.greenPale, borderRadius: 10, padding:'11px 16px', fontSize: 12,
            color: T.inkSoft, lineHeight: 1.7 }}>
            ✅ 此為獨立試算功能，可自由調整假設，不影響實際帳戶；若需正式申請提領，請聯繫您的公司窗口或客服。
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   App Root
═══════════════════════════════════════════════ */
function App() {
  const [role, setRole] = useState(null);
  const [page, setPage] = useState('home');
  const [view, setView] = useState('welcome'); // welcome | about | app
  const [tour, setTour] = useState(false);
  const [seenTour, setSeenTour] = useState({});
  // 自提加碼 ledger：L3 寫入，L2 資金結構／自提 KPI 讀取（同一資料，不建平行結構）
  const [topUps, setTopUps] = useState([]);
  const topUpTotal = topUps.reduce((a, t) => a + t.amt, 0);

  const login = (r) => {
    // 員工登入直達個人資產（最短路徑看到「我的錢」）；管理端進入主選單挑任務
    setRole(r); setPage(r === 'L3' ? 'dash' : 'home'); setView('app');
    if (!seenTour[r]) { setTour(true); setSeenTour(s => ({ ...s, [r]: true })); }
  };
  const logout = () => { setRole(null); setView('welcome'); };

  if (view === 'about') return <AboutPage onBack={() => setView(role ? 'app' : 'welcome')} />;
  if (view === 'welcome' || !role) return <WelcomePage onLogin={login} onAbout={() => setView('about')} />;

  const PAGES = {
    L1: { org: <OrgPage />, model: <ModelPage />, advice: <AdvicePage role="L1" />,
          emp: <EmpPage role="L1" />, trade: <TradeReportPage />, monitor: <MonitorPage />,
          sim: <MarketSimPage /> },
    L2: { dash: <L2Dashboard topUpTotal={topUpTotal} />, evp: <RetentionDash topUpTotal={topUpTotal} />, emp: <EmpPage role="L2" />,
          advice: <AdvicePage role="L2" />, trade: <TradeReportPage />, model: <ModelPage readOnly />,
          sim: <MarketSimPage /> },
    L3: { dash: <L3Dashboard setPage={setPage} topUps={topUps}
            onTopUp={a => setTopUps(t => [...t, { amt: a, at: Date.now() }])} />,
          trades: <L3Trades topUps={topUps} />, retire: <RetirePage />,
          draw: <WithdrawPage />, member: <MemberPage /> },
  };
  const body = page === 'home'
    ? <MenuHome role={role} setPage={setPage} onTour={() => setTour(true)} />
    : page === 'faq' ? <FAQPage />
    : (PAGES[role][page] || <MenuHome role={role} setPage={setPage} onTour={() => setTour(true)} />);

  return (
    <div>
      <Sidebar role={role} page={page} setPage={setPage} onLogout={logout}
        onSwitchRole={logout} />
      <div className="app-content" style={{ marginLeft: 218, minHeight:'100vh', display:'flex', flexDirection:'column' }}>
        {/* 頂部麵包屑列 */}
        <div className="app-crumb" style={{ background:'#fff', borderBottom:`1px solid ${T.line}`, padding:'11px 26px',
          display:'flex', justifyContent:'space-between', alignItems:'center', position:'sticky', top: 0, zIndex: 40 }}>
          <div style={{ fontSize: 12.5, color: T.mute }}>
            <span style={{ cursor:'pointer', color: page === 'home' ? T.ink : T.blue, fontWeight: page === 'home' ? 700 : 500 }}
              onClick={() => setPage('home')}>🏠 系統主選單</span>
            {page !== 'home' && <span> ／ <b style={{ color: T.ink }}>
              {page === 'faq' ? '常見問題' : (ROLES[role].menu.find(m => m.id === page) || {}).label}</b></span>}
          </div>
          <div style={{ display:'flex', gap: 14, alignItems:'center' }}>
            <button onClick={() => setView('about')} style={{ background:'none', border:'none',
              color: T.mute, fontSize: 12 }}>👋 關於此計畫</button>
            <Badge color={ROLES[role].color}>{ROLES[role].label}</Badge>
          </div>
        </div>
        <div key={role + page} className="fade-up app-main" style={{ flex: 1, padding:'24px 26px 60px', maxWidth: 1280, width:'100%' }}>
          {body}
        </div>
        <div style={{ padding:'14px 26px', borderTop:`1px solid ${T.line}`, fontSize: 10.5, color: T.dim,
          display:'flex', justifyContent:'space-between', flexWrap:'wrap', gap: 8, background:'#fff' }}>
          <span>本平台為 Prototype v2 示意 · 資料皆為模擬 · 純前端計算，輸入數據不會傳送至外部伺服器</span>
          <span className="mono">Copyright © 2026 阿爾發證券投資顧問(股)公司</span>
        </div>
      </div>
      {tour && <Walkthrough role={role} onDone={() => setTour(false)} />}
      <ChatWidget />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
